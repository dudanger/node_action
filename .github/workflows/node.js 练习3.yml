name: node.js 练习3

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.set_result.outputs.test_result }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - id: run_tests
        run: npm test && echo "status=success" >> $GITHUB_OUTPUT || echo "status=failure" >> $GITHUB_OUTPUT
      - name: Set output result
        id: set_result
        run: |
          if [ "${{ steps.run_tests.outputs.status }}" = "success" ]; then
            echo "test_result=true" >> $GITHUB_OUTPUT
          else
            echo "test_result=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.json
        if: always()

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && needs.test.outputs.test_result == 'true'
    steps:
      - name: Deploy simulation
        run: echo "Deploying to production because tests passed on main branch."
