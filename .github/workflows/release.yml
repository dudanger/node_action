name: Create Release

on:
  push:
    tag:
      - 'v*'

permissions: 
  contents: read
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Run tests
        run: npm test
      - name: Release
        uses: softprops/action-gh-release@v3
