name: Multi Environments

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  QA-deploy:
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GA169 }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.IP_ADDRESS }} >> ~/.ssh/known_hosts

      #- name: Test SSH connection
        # run: ssh -o StrictHostKeyChecking=yes ${{ secrets.VPS_USER }}@${{ vars.IP_ADDRESS }} "echo 'QA-deploy SSH connection successful'"
        # 实际使用中, 把 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 替换为后台 Environments 设置好的变量 ${{ env.USER }}@${{ env.IP_ADDR }} 
        # 不同的环境, 分配不同的变量. secrets 中的变量被加密, env变量明文传输, 重要的变量放在 secrets 中.
        
  STG-deploy:
    runs-on: ubuntu-latest
    environment: STG
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GA169 }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -o StrictHostKeyChecking=yes ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo 'STG SSH connection successful'"

  PROG-deploy:
    runs-on: ubuntu-latest
    environment: PROG
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GA169 }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -o StrictHostKeyChecking=yes ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo 'PROG SSH connection successful'"
      

      
